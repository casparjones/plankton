<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Krill on dark teal background (matching logo-transparent.png) -->
  <rect width="64" height="64" rx="12" fill="#0B4959"/>
  <rect x="3" y="3" width="58" height="58" rx="10" fill="#0F3D4D"/>

  <!-- Krill body: curved shrimp shape -->
  <path d="M38 22 C42 24, 44 28, 42 32 C40 36, 36 40, 30 44 C26 46, 22 47, 20 46 C18 45, 18 42, 22 38 C26 34, 32 28, 38 22Z" fill="#18F9F5" opacity="0.9"/>
  <!-- Green belly -->
  <path d="M36 26 C39 28, 40 31, 38 34 C36 37, 32 40, 28 42 C26 43, 24 42, 26 39 C28 36, 33 30, 36 26Z" fill="#92F972" opacity="0.8"/>

  <!-- Body segment stripes -->
  <line x1="36" y1="28" x2="32" y2="32" stroke="#0B4959" stroke-width="1" opacity="0.4"/>
  <line x1="34" y1="30" x2="30" y2="34" stroke="#0B4959" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="32" x2="28" y2="36" stroke="#0B4959" stroke-width="1" opacity="0.4"/>
  <line x1="30" y1="34" x2="26" y2="38" stroke="#0B4959" stroke-width="1" opacity="0.4"/>

  <!-- Tail -->
  <path d="M20 46 C18 48, 16 49, 14 48 C15 47, 17 45, 20 46Z" fill="#7DFAF5"/>
  <path d="M20 46 C19 49, 17 50, 15 50 C16 48, 18 47, 20 46Z" fill="#18F9F5"/>

  <!-- Antennae -->
  <path d="M40 22 C44 18, 48 14, 50 10" stroke="#18F9F5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M38 22 C40 16, 42 12, 46 8" stroke="#18F9F5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M39 23 C42 20, 45 18, 48 16" stroke="#7DFAF5" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Eye -->
  <circle cx="39" cy="25" r="2.5" fill="#0FC3F5"/>
  <circle cx="39" cy="25" r="1.5" fill="#0B4959"/>
  <circle cx="39.5" cy="24.5" r="0.6" fill="#fff"/>

  <!-- Legs -->
  <line x1="36" y1="31" x2="38" y2="35" stroke="#18F9F5" stroke-width="1" stroke-linecap="round"/>
  <line x1="34" y1="33" x2="36" y2="37" stroke="#92F972" stroke-width="1" stroke-linecap="round"/>
  <line x1="32" y1="35" x2="34" y2="39" stroke="#92F972" stroke-width="1" stroke-linecap="round"/>
  <line x1="30" y1="37" x2="32" y2="41" stroke="#92F972" stroke-width="1" stroke-linecap="round"/>
  <line x1="28" y1="39" x2="30" y2="43" stroke="#92F972" stroke-width="1" stroke-linecap="round"/>
</svg>
